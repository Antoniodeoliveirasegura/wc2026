name: update-forecast
# The 2026 tournament finished on 19 Jul 2026 and the site is now a final, static record,
# so the 6-hourly schedule is switched off. Kept dispatch-only so the pages can still be
# regenerated by hand (e.g. after a code change) without waiting on a cron.
on:
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Refresh value bets (needs ODDS_API_KEY secret; tolerated if absent)
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python recommend_bets.py || echo "bets refresh skipped (no key / quota / API error)"
      - run: python simulate.py
      - name: Commit and push if anything changed
        run: |
          git config user.name "wc2026-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add forecast.md predictions.json \
                  docs/index.html docs/table.html docs/scores.html docs/knockout.html docs/bets.html
          git diff --staged --quiet || (git commit -m "Auto-update forecast" && git push)
