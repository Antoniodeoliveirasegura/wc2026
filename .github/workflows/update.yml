name: update-forecast
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python simulate.py
      - name: Commit and push if the forecast changed
        run: |
          git config user.name "wc2026-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add forecast.md docs/index.html predictions.json
          git diff --staged --quiet || (git commit -m "Auto-update forecast" && git push)
